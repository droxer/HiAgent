name: code_project
description: Scaffold, implement, and test a code project
version: "1.0"
tags: [code, project]
triggers: [create project, build app, scaffold, implement]
steps:
  - tool: shell_exec
    description: Create project directory
    input_template:
      command: "mkdir -p {project_name} && cd {project_name}"
  - tool: file_write
    description: Write main file
    input_template:
      path: "/home/user/{project_name}/{main_file}"
      content: "{code}"
  - tool: code_run
    description: Run tests
    input_template:
      code: "{test_code}"
      language: "{language}"
